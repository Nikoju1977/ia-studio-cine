<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI STUDIO PRO | Master Edition (Niko)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --accent: #e74c3c; --bg: #0a0a0a; --panel: #161616; --border: #333; --text: #ddd; --editor-bg: #ffffff; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #000; padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .title-bar { font-weight: 800; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; font-size: 0.85rem; }
        #model-status { font-size: 0.7rem; color: #00ff00; background: #1a2e1a; padding: 5px 12px; border-radius: 4px; border: 1px solid #2d4d2d; }

        .main-container { display: grid; grid-template-columns: 260px 1fr 260px; flex-grow: 1; overflow: hidden; }
        
        /* Sidebar Navigation */
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
        .section-title { color: #555; font-size: 0.6rem; letter-spacing: 1.2px; margin: 15px 0 5px 0; text-transform: uppercase; font-weight: 900; }
        
        .nav-item { padding: 10px 12px; background: #222; border-radius: 5px; cursor: pointer; transition: 0.2s; font-size: 0.8rem; border: 1px solid transparent; text-align: left; color: #aaa; width: 100%; }
        .nav-item:hover { border-color: var(--accent); color: #fff; }
        .nav-item.active { background: var(--accent); color: #fff; font-weight: bold; }

        /* Editeur Principal */
        .editor-container { display: flex; flex-direction: column; background: var(--editor-bg); color: #111; position: relative; overflow-y: auto; }
        .editor-header { background: #f4f4f4; padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 5; }
        #view-title { font-weight: bold; font-family: 'Courier New', monospace; font-size: 0.95rem; color: #333; }
        
        #main-editor { flex-grow: 1; padding: 40px; font-family: 'Courier New', monospace; font-size: 1.05rem; border: none; outline: none; resize: none; line-height: 1.6; min-height: 100%; color: #111; }

        /* Storyboard Grid */
        #storyboard-container { display: none; padding: 30px; background: #000; border-top: 4px solid var(--accent); grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .storyboard-img { width: 100%; border-radius: 6px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); border: 1px solid #333; transition: 0.3s; }

        /* Barre de Contrôle */
        .control-bar { background: #000; padding: 15px 25px; border-top: 1px solid var(--border); display: flex; gap: 15px; align-items: center; }
        textarea.book-input { flex-grow: 1; height: 50px; background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; font-size: 0.85rem; resize: none; }
        textarea.book-input.dragover { border: 2px dashed var(--accent); background: #2a1616; }
        
        button { padding: 10px 18px; border-radius: 4px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; font-size: 0.75rem; text-transform: uppercase; }
        .btn-primary { background: var(--accent); color: white; height: 50px; min-width: 220px; }
        .btn-secondary { background: #333; color: #ccc; border: 1px solid #444; width: 100%; margin-top: 5px; }
        .btn-pdf { background: #2980b9; color: white; }

        /* Loader */
        .loading-overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; color: white; }
        .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="title-bar">🎬 STUDIO IA : MASTER PRODUCTION</div>
    <div id="model-status">MISTRAL AI READY</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="section-title">PHASE 1 : ADAPTATION</div>
        <button class="nav-item active" onclick="switchView('bible', event)">📖 Analyse & Bible</button>
        <button class="nav-item" onclick="switchView('narratif', event)">🗺️ Séquencier</button>
        <button class="nav-item" onclick="switchView('script', event)">📜 Scénario (Fountain)</button>
        
        <div class="section-title">PHASE 2 : TECHNIQUE</div>
        <button class="nav-item" onclick="switchView('technique', event)">🎥 Shot List</button>
        <button class="nav-item" onclick="switchView('image', event)">📸 Storyboard Visuel</button>
        <button class="nav-item" onclick="switchView('audio', event)">🔊 Sound Design</button>
        <button class="nav-item" onclick="switchView('light', event)">💡 Set-up Lumière</button>
        
        <div style="flex-grow: 1;"></div>
        <div class="section-title">EXPORTS FINALISÉS</div>
        <button class="btn-secondary" onclick="exportDoc()">📥 DOSSIER (.txt)</button>
        <button class="btn-secondary btn-pdf" onclick="exportScenarioPDF()">🖋️ SCÉNARIO (.pdf)</button>
    </div>

    <div class="editor-container">
        <div id="loader" class="loading-overlay">
            <div class="spinner"></div>
            <h2 id="loader-text" style="font-size: 1.2rem;">CALCUL DES AGENTS...</h2>
        </div>
        
        <div class="editor-header">
            <span id="view-title">ÉDITEUR : ANALYSE & BIBLE</span>
            <div id="word-count" style="font-size: 0.7rem; color: #888;">0 mots</div>
        </div>
        
        <textarea id="main-editor" spellcheck="false" oninput="updateWordCount()"></textarea>
        <div id="storyboard-container"></div>
    </div>

    <div class="sidebar" style="border-left: 1px solid var(--border); border-right: none;">
        <div class="section-title">CONFIGURATION</div>
        <input type="password" id="apiKey" placeholder="Clé API Mistral" style="width: 100%; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; box-sizing: border-box; font-size: 0.8rem;">
        
        <div class="section-title">INFOS PROJET</div>
        <div style="font-size: 0.75rem; color: #777; line-height: 1.4;">
            Utilisateur : <strong>Niko</strong><br>
            Moteur : Mistral Large 2<br>
            Export : Industry Standard
        </div>
    </div>
</div>

<div class="control-bar">
    <textarea class="book-input" id="bookInput" placeholder="Glissez PDF, DOCX ou TXT ici..."></textarea>
    <button class="btn-primary" id="launchBtn">🚀 GÉNÉRER LE FILM COMPLET</button>
</div>

<script type="module">
    // --- INITIALISATION ---
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let data = { bible: "", narratif: "", script: "", technique: "", image: "", audio: "", light: "" };
    let currentView = 'bible';

    const AGENTS = {
        bible: { prompt: "Tu es Script-Doctor. Extrais la Bible : Thèmes, arcs dramatiques, psychologie. Profond et analytique.", model: "mistral-large-latest" },
        narratif: { prompt: "Tu es Scénariste. Découpe en séquences : N° - LIEU - ACTION. Rythme soutenu.", model: "mistral-small-latest" },
        script: { prompt: "Tu es Dialoguiste. Rédige au format FOUNTAIN. MAJUSCULES pour noms, actions visuelles.", model: "mistral-large-latest" },
        technique: { prompt: "Tu es Assistant Réal. Crée la Shot List détaillée (Valeur de plan, angle).", model: "mistral-small-latest" },
        image: { prompt: "Tu es Chef Opérateur. Génère 4 PROMPTS anglais de storyboard entre [PROMPT: et ].", model: "mistral-small-latest" },
        audio: { prompt: "Tu es Sound Designer. Liste ambiances, SFX et Soundscape.", model: "mistral-small-latest" },
        light: { prompt: "Tu es Chef Électricien. Détaille le set-up lumière pro.", model: "mistral-small-latest" }
    };

    // --- LOGIQUE MISTRAL ---
    async function callMistral(agentKey, content) {
        const key = document.getElementById("apiKey").value;
        if(!key) throw new Error("Veuillez entrer votre clé API Mistral.");

        const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
            body: JSON.stringify({
                model: AGENTS[agentKey].model,
                messages: [
                    { role: "system", content: AGENTS[agentKey].prompt },
                    { role: "user", content: content.substring(0, 20000) }
                ],
                temperature: 0.7
            })
        });
        const res = await response.json();
        if (res.error) throw new Error(res.error.message);
        return res.choices[0].message.content;
    }

    // --- PIPELINE PRODUCTION ---
    async function runProduction() {
        const input = document.getElementById("bookInput").value;
        if(!input) return alert("Le manuscrit est vide !");
        
        document.getElementById("launchBtn").disabled = true;
        let context = input;

        for (let step of Object.keys(AGENTS)) {
            updateLoader(`GÉNÉRATION : ${step.toUpperCase()}...`);
            try {
                const result = await callMistral(step, context);
                data[step] = result;
                if(step === 'bible') context = "Basé sur cette Bible :\n" + data.bible;
                if(step === 'script') context = "Basé sur ce script :\n" + data.script;
            } catch (err) { alert(err.message); break; }
        }

        hideLoader();
        switchView('bible');
        document.getElementById("launchBtn").disabled = false;
    }

    // --- IMPORTATION ---
    const dropZone = document.getElementById("bookInput");
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", async (e) => {
        e.preventDefault(); dropZone.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        const ext = file.name.split('.').pop().toLowerCase();
        updateLoader("LECTURE FICHIER...");
        try {
            if (ext === 'txt') dropZone.value = await file.text();
            else if (ext === 'docx') {
                const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                dropZone.value = res.value;
            } else if (ext === 'pdf') {
                const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str).join(" ") + "\n";
                }
                dropZone.value = text;
            }
        } catch (err) { alert("Erreur lors de l'importation."); }
        hideLoader();
    });

    // --- UI & RENDER ---
    window.switchView = (id, event) => {
        currentView = id;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(event) event.target.classList.add('active');
        document.getElementById("main-editor").value = data[id] || "";
        document.getElementById("view-title").innerText = `ÉDITEUR : ${id.toUpperCase()}`;
        updateWordCount();
        
        if(id === 'image') renderStoryboard(data.image);
        else {
            document.getElementById("storyboard-container").style.display = "none";
            document.getElementById("main-editor").style.display = "block";
        }
    };

    function renderStoryboard(text) {
        const container = document.getElementById("storyboard-container");
        container.innerHTML = "";
        const regex = /\[PROMPT:(.*?)\]/g;
        let match, found = false;
        while ((match = regex.exec(text)) !== null) {
            found = true;
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(match[1])}?width=1280&height=720&nologo=true`;
            container.innerHTML += `<img src="${url}" class="storyboard-img">`;
        }
        if (found) {
            container.style.display = "grid";
            document.getElementById("main-editor").style.display = "none";
        }
    }

    // --- EXPORTS ---
    window.exportScenarioPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const script = data.script;
        if(!script) return alert("Aucun scénario généré.");

        doc.setFont("courier", "normal");
        doc.setFontSize(12);
        
        const lines = doc.splitTextToSize(script, 170);
        let y = 20;
        
        lines.forEach(line => {
            if (y > 280) { doc.addPage(); y = 20; }
            doc.text(line, 20, y);
            y += 7;
        });
        doc.save("Scenario_Niko_Production.pdf");
    };

    window.exportDoc = () => {
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Dossier_Complet_Niko.txt";
        a.click();
    };

    window.updateWordCount = () => {
        const text = document.getElementById("main-editor").value;
        const count = text.trim() ? text.trim().split(/\s+/).length : 0;
        document.getElementById("word-count").innerText = `${count} mots`;
        data[currentView] = text; // Autosave
    };

    function updateLoader(m) { document.getElementById("loader").style.display = "flex"; document.getElementById("loader-text").innerText = m; }
    function hideLoader() { document.getElementById("loader").style.display = "none"; }

    document.getElementById("launchBtn").onclick = runProduction;
</script>
</body>
</html>
