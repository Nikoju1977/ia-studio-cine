<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI STUDIO PRO | Master Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    
    <style>
        :root { --accent: #e74c3c; --bg: #0a0a0a; --panel: #161616; --border: #333; --text: #ddd; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #000; padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .title-bar { font-weight: bold; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; font-size: 0.9rem; }
        #model-status { font-size: 0.75rem; color: #888; background: #222; padding: 6px 12px; border-radius: 4px; border: 1px solid #444; }

        .main-container { display: grid; grid-template-columns: 280px 1fr 250px; flex-grow: 1; overflow: hidden; }
        
        /* Sidebar gauche */
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .section-title { color: #555; font-size: 0.65rem; letter-spacing: 1.5px; margin-top: 15px; margin-bottom: 5px; text-transform: uppercase; font-weight: 800; }
        
        .nav-item { padding: 12px; background: #222; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.8rem; border: 1px solid transparent; text-align: left; color: #aaa; width: 100%; }
        .nav-item:hover { border-color: var(--accent); color: #fff; background: #282828; }
        .nav-item.active { background: var(--accent); color: #fff; font-weight: bold; border-color: var(--accent); }

        /* Zone Editeur */
        .editor-container { display: flex; flex-direction: column; background: #fff; color: #1a1a1a; position: relative; overflow-y: auto; }
        .editor-header { background: #f8f8f8; padding: 12px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 5; }
        #view-title { font-weight: bold; font-family: 'Courier New', monospace; font-size: 1rem; color: #444; }
        
        #main-editor { flex-grow: 1; padding: 40px; font-family: 'Courier New', monospace; font-size: 1.1rem; border: none; outline: none; resize: none; line-height: 1.7; min-height: 600px; color: #111; }

        /* Storyboard */
        #storyboard-container { display: none; padding: 30px; background: #111; border-top: 4px solid var(--accent); grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .storyboard-img { width: 100%; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .storyboard-img:hover { transform: scale(1.02); border-color: var(--accent); }

        /* Sidebar droite */
        .sidebar-right { background: var(--panel); border-left: 1px solid var(--border); padding: 15px; overflow-y: auto; }

        /* Barre de contrôle basse */
        .control-bar { background: #000; padding: 20px 25px; border-top: 1px solid var(--border); display: flex; gap: 15px; align-items: center; }
        textarea.book-input { flex-grow: 1; height: 50px; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; font-size: 0.85rem; resize: none; transition: 0.3s; }
        textarea.book-input:focus { border-color: var(--accent); outline: none; background: #222; }
        textarea.book-input.dragover { border: 2px dashed var(--accent); background: #2a1616; }
        
        button { padding: 12px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; font-size: 0.8rem; text-transform: uppercase; }
        .btn-primary { background: var(--accent); color: white; height: 50px; min-width: 180px; }
        .btn-primary:disabled { opacity: 0.3; cursor: wait; }
        .btn-secondary { background: #333; color: #ccc; border: 1px solid #444; }
        .btn-secondary:hover { background: #444; color: #fff; }

        /* Overlay de chargement */
        .loading-overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .version-item { background: #222; padding: 10px; font-size: 0.75rem; border-radius: 4px; cursor: pointer; margin-bottom: 8px; border-left: 3px solid #444; transition: 0.2s; }
        .version-item:hover { border-left-color: var(--accent); background: #2a2a2a; }
    </style>
</head>
<body>

<header>
    <div class="title-bar">STUDIO IA : MASTER EDITION</div>
    <div id="model-status">Initialisation du moteur IA...</div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="section-title">PHASE 1 : ADAPTATION</div>
        <button class="nav-item active" onclick="switchView('bible', event)">📖 Analyse & Bible</button>
        <button class="nav-item" onclick="switchView('narratif', event)">🗺️ Séquencier</button>
        <button class="nav-item" onclick="switchView('script', event)">📜 Scénario (Fountain)</button>
        
        <div class="section-title">PHASE 2 : TECHNIQUE</div>
        <button class="nav-item" onclick="switchView('technique', event)">🎥 Shot List</button>
        <button class="nav-item" onclick="switchView('image', event)">📸 Storyboard Visuel</button>
        <button class="nav-item" onclick="switchView('audio', event)">🔊 Sound Design</button>
        <button class="nav-item" onclick="switchView('light', event)">💡 Set-up Lumière</button>
        
        <div style="flex-grow: 1;"></div>
        <button class="btn-secondary" onclick="exportDoc()">📥 EXPORTER LE DOSSIER</button>
    </div>

    <div class="editor-container">
        <div id="loader" class="loading-overlay">
            <div class="spinner"></div>
            <h2 id="loader-text" style="color: white; margin: 0;">L'IA ANALYSE...</h2>
            <p id="loader-sub" style="color: #666; font-size: 0.9rem; margin-top: 10px;">Ceci peut prendre quelques minutes selon la taille du fichier.</p>
        </div>
        
        <div class="editor-header">
            <span id="view-title">ÉDITEUR : ANALYSE & BIBLE</span>
            <div style="display: flex; gap: 10px;">
                <button class="btn-secondary" style="padding: 5px 10px; font-size: 0.7rem;" onclick="location.reload()">Reset Studio</button>
            </div>
        </div>
        
        <textarea id="main-editor" spellcheck="false" placeholder="Le contenu généré apparaîtra ici. Vous pourrez le modifier manuellement."></textarea>
        <div id="storyboard-container"></div>
    </div>

    <div class="sidebar-right">
        <div class="section-title">HISTORIQUE SESSIONS</div>
        <button class="btn-secondary" style="width: 100%; color: var(--accent); margin-bottom: 15px;" onclick="saveVersion()">💾 SAUVEGARDER L'ÉTAT</button>
        <div id="history-list"></div>
    </div>
</div>

<div class="control-bar">
    <textarea class="book-input" id="bookInput" placeholder="Glissez PDF, DOCX ou TXT ici pour commencer..."></textarea>
    <button class="btn-primary" id="launchBtn" disabled>🚀 GÉNÉRER LE FILM</button>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    // --- CONFIGURATION ---
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    
    let engine;
    let data = { bible: "", narratif: "", script: "", technique: "", image: "", audio: "", light: "" };
    let currentView = 'bible';
    let versions = [];

    const AGENTS = {
        bible: "Tu es Script-Doctor expert. Extrais l'ADN du texte : Thèmes, arcs dramatiques (Besoin vs Désir) et symbolisme. Sois littéraire et profond.",
        narratif: "Tu es Scénariste. Découpe l'histoire en séquences. Format : SÉQUENCE N° - LIEU - ACTION SYNTHÉTIQUE.",
        script: "Tu es Dialoguiste. Rédige le scénario au format FOUNTAIN. Noms en MAJUSCULES, dialogues dessous, actions au présent. Uniquement le visuel.",
        technique: "Tu es Premier Assistant Réalisateur. Crée une Shot List (Valeur de plan, mouvement, angle) basée sur le script.",
        image: "Tu es Chef Opérateur. Définit l'esthétique. GÉNÈRE 4 PROMPTS anglais pour storyboard entre [PROMPT: et ]. Exemple: [PROMPT: Cinematic, 35mm, wide shot, protagonist in rain]",
        audio: "Tu es Sound Designer. Liste les ambiances, SFX et intentions musicales.",
        light: "Tu es Chef Électricien. Détaille le set-up lumière (3-point lighting, gels, intensité)."
    };

    // --- INITIALISATION ---
    async function init() {
        try {
            engine = await webllm.CreateMLCEngine("Llama-3-8B-Instruct-v0.1-q4f32_1-MLC", {
                initProgressCallback: (r) => { document.getElementById("model-status").innerText = r.text; }
            });
            document.getElementById("launchBtn").disabled = false;
            document.getElementById("model-status").innerText = "MOTEUR NEURONAL PRÊT 🟢";
        } catch(e) {
            document.getElementById("model-status").innerText = "ERREUR WEBGPU 🔴";
            console.error(e);
        }
    }

    // --- IMPORTATION DE FICHIERS ---
    const dropZone = document.getElementById("bookInput");
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", async (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (!file) return;

        const ext = file.name.split('.').pop().toLowerCase();
        updateLoader("Lecture du fichier...");

        try {
            if (ext === 'txt') {
                dropZone.value = await file.text();
            } else if (ext === 'docx') {
                const buffer = await file.arrayBuffer();
                const res = await mammoth.extractRawText({ arrayBuffer: buffer });
                dropZone.value = res.value;
            } else if (ext === 'pdf') {
                const buffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str).join(" ") + "\n";
                }
                dropZone.value = text;
            }
        } catch (err) { alert("Erreur de lecture"); }
        hideLoader();
    });

    // --- PIPELINE DE PRODUCTION ---
    async function runProduction() {
        const input = dropZone.value;
        if(!input) return alert("Veuillez importer un texte !");
        
        document.getElementById("launchBtn").disabled = true;
        let lastContext = input;

        const steps = Object.keys(AGENTS);
        for (let step of steps) {
            updateLoader(`AGENT : ${step.toUpperCase()} EN COURS...`);
            try {
                const res = await engine.chat.completions.create({
                    messages: [
                        { role: "system", content: AGENTS[step] + " Réfléchis étape par étape pour Niko." },
                        { role: "user", content: lastContext.substring(0, 10000) } // Sécurité contexte
                    ],
                    temperature: 0.7
                });
                data[step] = res.choices[0].message.content;
                // Transition de contexte intelligente
                if(step === 'bible') lastContext = data.bible;
                if(step === 'script') lastContext = data.script;
            } catch (err) { console.error(err); }
        }

        hideLoader();
        switchView('bible');
        document.getElementById("launchBtn").disabled = false;
        saveVersion("Production Master Terminée");
    }

    // --- INTERFACE ---
    window.switchView = (id, event) => {
        currentView = id;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(event) event.target.classList.add('active');
        
        document.getElementById("main-editor").value = data[id] || "";
        document.getElementById("view-title").innerText = `ÉDITEUR : ${id.toUpperCase()}`;

        if(id === 'image') renderStoryboard(data.image);
        else document.getElementById("storyboard-container").style.display = "none";
    };

    function renderStoryboard(text) {
        const container = document.getElementById("storyboard-container");
        container.innerHTML = "";
        const regex = /\[PROMPT:(.*?)\]/g;
        let match;
        let found = false;

        while ((match = regex.exec(text)) !== null) {
            found = true;
            const prompt = encodeURIComponent(match[1].trim() + ", cinematic style, 8k, movie scene");
            const url = `https://image.pollinations.ai/prompt/${prompt}?width=1280&height=720&nologo=true`;
            container.innerHTML += `<img src="${url}" class="storyboard-img">`;
        }
        container.style.display = found ? "grid" : "none";
    }

    function updateLoader(msg) {
        document.getElementById("loader").style.display = "flex";
        document.getElementById("loader-text").innerText = msg;
    }

    function hideLoader() { document.getElementById("loader").style.display = "none"; }

    window.saveVersion = (name) => {
        const label = name || `Session ${new Date().toLocaleTimeString()}`;
        versions.push({ label, data: JSON.parse(JSON.stringify(data)) });
        const list = document.getElementById("history-list");
        list.innerHTML = versions.map((v, i) => `<div class="version-item" onclick="loadVersion(${i})">📁 ${v.label}</div>`).join('');
    };

    window.loadVersion = (i) => {
        data = JSON.parse(JSON.stringify(versions[i].data));
        switchView(currentView);
    };

    window.exportDoc = () => {
        let content = "DOSSIER DE PRODUCTION - NIKO\n\n";
        for (let key in data) {
            content += `=== ${key.toUpperCase()} ===\n${data[key]}\n\n`;
        }
        const blob = new Blob([content], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Dossier_Film_Niko.txt";
        a.click();
    };

    document.getElementById("launchBtn").onclick = runProduction;
    init();
</script>
</body>
</html>
